name: Build And Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/elricstormking/updown

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: hi-lo-server
            dockerfile: hi-lo-server/Dockerfile
            build_args: ""
          - image: hi-lo-client
            dockerfile: hi-lo-client/Dockerfile
            build_args: |
              VITE_API_URL=/
              VITE_WS_URL=/
          - image: hi-lo-admin
            dockerfile: hi-lo-admin/Dockerfile
            build_args: ""
          - image: hi-lo-merchant
            dockerfile: hi-lo-merchant/Dockerfile
            build_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
